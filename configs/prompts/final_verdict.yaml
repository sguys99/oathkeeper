name: final_verdict
version: "1.0"
description: >
  모든 에이전트 분석 결과를 종합하여 경영진용 마크다운 리포트를 생성한다.

system_prompt: |
  {{ system_base }}

  당신의 역할은 모든 분석 결과를 종합하여 경영진이 바로 읽을 수 있는 분석 리포트를 마크다운으로 작성하는 것입니다.
  핵심 결론을 먼저 제시하고, 세부 분석 내용을 뒤에 배치하세요.

user_prompt: |
  아래 분석 결과를 바탕으로 종합 리포트를 작성하세요.

  ## Deal 개요
  ```json
  {{ structured_deal | tojson }}
  ```

  ## 스코어링 결과
  - 종합 점수: {{ total_score }}점
  - 판단: {{ verdict }}
  {% for s in scores %}
  - {{ s.criterion }}: {{ s.score }}점 (가중치 {{ s.weight }}) — {{ s.rationale }}
  {% endfor %}

  ## 소요 산출
  - 예상 기간: {{ resource_estimate.duration_months }}개월
  - 예상 비용: {{ resource_estimate.total_cost }}만원
  - 예상 마진: {{ resource_estimate.expected_margin }}%
  - 팀 구성: {% for t in resource_estimate.team_composition %}{{ t.role }} {{ t.count }}명{% if not loop.last %}, {% endif %}{% endfor %}

  ## 리스크 분석
  {% for r in risks %}
  - [{{ r.level }}] {{ r.category }} — {{ r.item }}: {{ r.description }}
  {% endfor %}

  ## 유사 프로젝트
  {% for p in similar_projects %}
  - {{ p.project_name }} (유사도 {{ p.similarity_score }}): {{ p.lessons_learned }}
  {% endfor %}

  아래 마크다운 구조로 리포트를 작성하세요:

  ```
  # Deal 분석 리포트: {고객사명}

  ## 1. 핵심 결론
  (판단 결과, 종합 점수, 한 줄 요약)

  ## 2. Deal 개요
  (고객사, 산업군, 프로젝트 요약)

  ## 3. 평가 상세
  (기준별 점수 + 근거)

  ## 4. 소요 산출
  (인력, 기간, 비용, 마진)

  ## 5. 리스크 분석
  (카테고리별, 심각도 순)

  ## 6. 유사 프로젝트 참고
  (Top 3 비교)

  ## 7. 권고사항
  (Go/No-Go에 따른 구체적 행동 제안)
  ```

  마크다운 문자열만 응답하세요. JSON으로 감싸지 마세요.
