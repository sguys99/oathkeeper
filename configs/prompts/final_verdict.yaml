name: final_verdict
version: "1.0"
description: >
  모든 에이전트 분석 결과를 종합하여 경영진용 마크다운 리포트를 생성한다.

system_prompt: |
  {{ system_base }}

  당신의 역할은 모든 분석 결과를 종합하여 경영진이 바로 읽을 수 있는 분석 리포트를 마크다운으로 작성하는 것입니다.
  핵심 결론을 먼저 제시하고, 세부 분석 내용을 뒤에 배치하세요.

user_prompt: |
  아래 분석 결과를 바탕으로 종합 리포트를 작성하세요.

  ## Deal 개요
  ```json
  {{ structured_deal | tojson }}
  ```

  ## 스코어링 결과
  - 종합 점수: {{ total_score }}점
  - 판단: {{ verdict }}
  {% for s in scores %}
  - {{ s.criterion }}: {{ s.score }}점 (가중치 {{ s.weight }}) — {{ s.rationale }}
  {% endfor %}

  ## 소요 산출
  - 예상 기간: {{ resource_estimate.duration_months }}개월 (버퍼 포함: {{ resource_estimate.duration_with_buffer }}개월)
  - 예상 비용: {{ resource_estimate.cost_breakdown.total_cost }}만원 (인건비 {{ resource_estimate.cost_breakdown.labor_cost }}만원 + 기타 {{ resource_estimate.cost_breakdown.overhead_cost }}만원)
  - 예상 마진: {{ (resource_estimate.profitability.expected_margin * 100) | round(1) }}% — {{ resource_estimate.profitability.margin_assessment }}
  - 팀 구성: {% for t in resource_estimate.team_composition %}{{ t.role }} {{ t.count }}명({{ t.duration_months }}개월){% if not loop.last %}, {% endif %}{% endfor %}
  - 주요 작업: {% for w in resource_estimate.work_breakdown %}{{ w.area }}{% if w.is_reusable %} (재활용 {{ (w.reuse_ratio * 100) | int }}%){% endif %}{% if not loop.last %}, {% endif %}{% endfor %}

  ## 리스크 분석
  {% for r in risks %}
  - [{{ r.level }}] {{ r.category }} — {{ r.item }}: {{ r.description }}{% if r.probability %} (확률: {{ r.probability }}, 영향: {{ r.impact }}){% endif %}
  {% endfor %}
  {% if risk_interdependencies is defined and risk_interdependencies %}

  ### 리스크 상호작용
  {% for ri in risk_interdependencies %}
  - {{ ri.risk_pair | join(" + ") }}: {{ ri.combined_effect }}
  {% endfor %}
  {% endif %}

  ## 유사 프로젝트
  {% for p in similar_projects %}
  - {{ p.project_name }} (유사도 {{ p.similarity_score }}): {{ p.lessons_learned }}
  {% endfor %}

  아래 마크다운 구조로 리포트를 작성하세요:

  ```
  # Deal 분석 리포트: {고객사명}

  ## 1. 핵심 결론
  (판단 결과, 종합 점수, 한 줄 요약)

  ## 2. Deal 개요
  (고객사, 산업군, 프로젝트 요약)

  ## 3. 평가 상세
  (기준별 점수 + 근거)

  ## 4. 소요 산출
  (인력, 기간, 비용, 마진)

  ## 5. 리스크 분석
  (카테고리별, 심각도 순 — 발생 확률과 영향도 포함)

  ### 5.1 교차 분석 인사이트
  - 스코어링에서 낮은 점수(60점 이하)를 받은 기준과 관련된 리스크가 있다면, 해당 리스크의 심각성이 증폭됨을 설명하세요.
  - 리소스 산출에서 마진이 15% 미만이거나 핵심 인력이 미배정된 경우, 재무/일정 리스크와 연결하세요.
  - 유사 프로젝트의 lessons_learned에서 현재 Deal의 리스크와 관련된 패턴이 있다면 언급하세요.
  - 리스크 상호작용(risk_interdependencies)이 있다면 핵심 내용을 포함하세요.

  ## 6. 유사 프로젝트 참고
  (Top 3 비교)

  ## 7. 권고사항
  (Go/No-Go에 따른 구체적 행동 제안)
  ```

  마크다운 문자열만 응답하세요. JSON으로 감싸지 마세요.
